      return (
        <span className={`inline-flex items-center gap-1 text-xs font-semibold px-2 py-0.5 rounded-full border ${c.bg} ${c.text} ${c.border} whitespace-nowrap`}>
          {c.icon} {cat}
        </span>
      );
    }

        <div className="flex gap-2 sm:gap-3 group place-card">
          <div className="w-10 sm:w-12 shrink-0 text-right pt-3.5">
            <span className="text-xs font-medium text-gray-400">{place.time}</span>

    /* ── Leaflet 지도 (동적 업데이트) ── */
    function TravelMap({ show, travelData, visibleDays }) {
      const mapRef         = useRef(null);
      const mapInst        = useRef(null);
      const layersRef      = useRef([]);
      const travelDataRef  = useRef(travelData);
      const visibleDaysRef = useRef(visibleDays);
      const pendingUpdate  = useRef(false);

      travelDataRef.current  = travelData;
      visibleDaysRef.current = visibleDays;

      const applyLayers = useCallback((map) => {
        layersRef.current.forEach(l => { try { l.remove(); } catch(e) {} });
        layersRef.current = [];

        travelDataRef.current.forEach((day, di) => {
          if (!visibleDaysRef.current[di]) return; // 필터링
          const cfg     = DAY_CFG[di];
          const color   = cfg.color;
          const withPos = day.places.filter(p => p.pos && Array.isArray(p.pos) && p.pos.length === 2);
          if (withPos.length === 0) return;

          if (withPos.length > 1) {
            const isDashed = di === 0 || di === 3;
            const line = L.polyline(withPos.map(p => p.pos), {
              color, weight: 5, opacity: 0.8,
              dashArray: isDashed ? '10,6' : null,
              lineJoin: 'round', lineCap: 'round',
            }).addTo(map);
            layersRef.current.push(line);
          }

          withPos.forEach(place => {
            const catIcon = CAT[place.cat]?.icon || '📍';
            const icon = L.divIcon({
              className: '',
              html: `<div style="background:${color};border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:13px;border:2.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3);">${catIcon}</div>`,
              iconSize: [30, 30], iconAnchor: [15, 15],
            });
            layersRef.current.push(
              L.marker(place.pos, { icon })
                .bindPopup(`<div style="font-family:'Noto Sans KR',sans-serif;">
                  <div style="font-weight:800;color:${color};font-size:12px;margin-bottom:4px;">${cfg.day} · ${cfg.date}</div>
                  <div style="font-weight:700;font-size:14px;margin-bottom:2px;">${place.name}</div>
                  <div style="color:#6b7280;font-size:12px;">⏰ ${place.time}</div>
                  <div style="color:#9ca3af;font-size:11px;margin-top:2px;">${place.detail}</div>
                </div>`)
                .addTo(map)
            );
          });
        });

        // 호텔 고정 마커
        const hotelIcon = L.divIcon({
          className: '',
          html: `<div style="background:#fff;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:20px;border:3px solid #f43f5e;box-shadow:0 3px 12px rgba(0,0,0,.35);position:relative;">🏨<div style="position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);background:#f43f5e;color:#fff;font-size:9px;font-weight:800;border-radius:4px;padding:1px 4px;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;">숙소</div></div>`,
          iconSize: [40, 46], iconAnchor: [20, 46],
        });
        layersRef.current.push(
          L.marker(HOTEL_POS, { icon: hotelIcon, zIndexOffset: 1000 })
            .bindPopup(`<div style="font-family:'Noto Sans KR',sans-serif;"><div style="font-weight:800;color:#f43f5e;font-size:13px;margin-bottom:4px;">🏨 숙소 (매일 베이스캠프)</div><div style="font-weight:700;font-size:14px;margin-bottom:2px;">아카사카 어반 호텔 신관</div><div style="color:#6b7280;font-size:12px;">4/10 체크인 · 4/13 체크아웃</div></div>`)
            .addTo(map)
        );

        // 나리타공항 고정 마커
        const nrtIcon = L.divIcon({
          className: '',
          html: `<div style="background:#fff;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:18px;border:3px solid #8B5CF6;box-shadow:0 3px 12px rgba(0,0,0,.3);position:relative;">✈️<div style="position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);background:#8B5CF6;color:#fff;font-size:9px;font-weight:800;border-radius:4px;padding:1px 4px;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;">NRT</div></div>`,
          iconSize: [36, 42], iconAnchor: [18, 42],
        });
        layersRef.current.push(
          L.marker(NRT_POS, { icon: nrtIcon, zIndexOffset: 900 })
            .bindPopup(`<div style="font-family:'Noto Sans KR',sans-serif;"><div style="font-weight:800;color:#8B5CF6;font-size:13px;margin-bottom:4px;">✈️ 나리타국제공항 (NRT)</div><div style="font-size:12px;color:#374151;">🛬 Day1 LJ209 · 17:15 도착</div><div style="font-size:12px;color:#374151;">🛫 Day4 LJ212 · 19:15 출발</div></div>`)
            .addTo(map)
        );

        map.fitBounds([[35.54, 139.55], [35.82, 140.50]], { padding: [20, 20] });
      }, []);

      // 지도 초기화 (한 번만)
      useEffect(() => {
        if (mapInst.current) return;
        const map = L.map(mapRef.current, { center: [35.675, 139.720], zoom: 13 });
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
          maxZoom: 19,
        }).addTo(map);
        mapInst.current = map;
        applyLayers(map);
      }, []);

      // travelData 또는 visibleDays 변경 시 레이어 업데이트
      useEffect(() => {
        if (!mapInst.current) return;
        if (!show) {
          pendingUpdate.current = true;
          return;
        }
        applyLayers(mapInst.current);
      }, [travelData, visibleDays]);

      // 홈탭 진입 시: invalidateSize + 대기 중인 업데이트 처리
      useEffect(() => {
        if (!show || !mapInst.current) return;

        const t1 = setTimeout(() => {
          if (!mapInst.current) return;
          mapInst.current.invalidateSize();
          if (pendingUpdate.current) {
            pendingUpdate.current = false;
            applyLayers(mapInst.current);
          }
        }, 50);

        const t2 = setTimeout(() => {
          mapInst.current?.invalidateSize();
        }, 300);

        return () => { clearTimeout(t1); clearTimeout(t2); };
      }, [show]);

      return <div ref={mapRef} id="leaflet-map" className="w-full" />;
    }

    /* ── 홈 뷰 ── */
    function HomeView({ onDay, show, travelData }) {

      const allPlaces = travelData.flatMap(d => d.places);

      const toggleDay = (i) => setVisibleDays(v => v.map((x, idx) => idx === i ? !x : x));

                {allOn ? '전체 해제' : '전체 선택'}
              </button>
            </div>

            {/* Day 필터 토글 버튼 */}
            <div className="px-4 py-2.5 flex gap-2 border-b border-gray-50">
              {DAY_CFG.map((d, i) => {
                const on = visibleDays[i];
                return (
                  <button key={i} onClick={() => toggleDay(i)}

                    <span className="mt-0.5">{d.day}</span>

            </div>

            <TravelMap show={show} travelData={travelData} visibleDays={visibleDays} />

            <div className="px-4 py-2.5 flex flex-wrap gap-x-3 gap-y-1">
              {DAY_CFG.map((d, i) => visibleDays[i] && (

                </div>
              ))}
              <p className="w-full text-xs text-gray-400 mt-0.5">🏨 아카사카 호텔 · ✈️ 나리타공항 · 점선 = 리무진버스</p>
            </div>
          </div>

          <div className="px-4 pt-4 max-w-2xl mx-auto lg:grid lg:grid-cols-2 lg:gap-4">
            <div className="col-span-2 grid grid-cols-4 gap-2 mb-4">
              {[
                { label:"총 장소", v:total,       icon:"📍", cls:"text-violet-600" },
                { label:"쇼핑",   v:counts.쇼핑,  icon:"🛍️", cls:"text-pink-600" },
                { label:"맛집",   v:counts.맛집,  icon:"🍜", cls:"text-orange-600" },
                { label:"카페",   v:counts.카페,  icon:"☕", cls:"text-amber-600" },
              ].map(s => (
                <div key={s.label} className="bg-white rounded-xl border border-gray-100 shadow-sm p-3 text-center">
                  <div className="text-xl">{s.icon}</div>
                  <div className={`text-xl font-extrabold ${s.cls}`}>{s.v}</div>
                  <div className="text-xs text-gray-500 font-medium mt-0.5">{s.label}</div>
                </div>
              ))}
            </div>

            <div className="bg-white rounded-xl border border-gray-100 shadow-sm p-4 mb-4">
              <h3 className="text-sm font-bold text-gray-700 mb-3">✈️ 항공편</h3>
              <div className="space-y-2">
                <div className="flex items-center gap-3 p-2.5 bg-violet-50 rounded-lg border border-violet-100">
                  <span className="text-xl">🛫</span>
                  <div className="flex-1 min-w-0">
                    <div className="text-xs font-bold text-violet-700">출국 · {TRIP.flightOut.code}</div>

                  <a href={`https://www.google.com/maps/search/${encodeURIComponent(TRIP.hotelMap)}`}
                    target="_blank" className="text-xs text-blue-500 hover:underline font-medium">
                    📍 지도 보기

              </div>
            </div>

            <div className="col-span-2 mb-4">
              <h3 className="text-sm font-bold text-gray-700 mb-2">📅 일정 개요</h3>

                {travelData.map((d, i) => (
                  <button key={i} onClick={() => onDay(`d${i}`)}

      return (

            {travelData.map((day, di) => (

                      </div>

    /* ── 체크리스트 뷰 ── */
    const CL_KEY      = 'tokyogogo-checklist-data';
    const PEOPLE_KEY  = 'tokyogogo-people';

    const GRAD_POOL = [
      { grad:'from-violet-500 to-purple-600', active:'bg-violet-500 border-violet-500', hover:'group-hover:border-violet-400', hex:'#8B5CF6' },
      { grad:'from-pink-500 to-rose-500',     active:'bg-pink-500 border-pink-500',     hover:'group-hover:border-pink-400',   hex:'#EC4899' },
      { grad:'from-blue-500 to-indigo-500',   active:'bg-blue-500 border-blue-500',     hover:'group-hover:border-blue-400',   hex:'#3B82F6' },
      { grad:'from-amber-500 to-orange-500',  active:'bg-amber-500 border-amber-500',   hover:'group-hover:border-amber-400',  hex:'#F59E0B' },
      { grad:'from-emerald-500 to-teal-500',  active:'bg-emerald-500 border-emerald-500', hover:'group-hover:border-emerald-400', hex:'#10B981' },
      { grad:'from-rose-500 to-red-500',      active:'bg-rose-500 border-rose-500',     hover:'group-hover:border-rose-400',   hex:'#F43F5E' },
    ];
    const EMOJI_POOL = ['🧡','💚','💙','💛','🩷','💜','🤍','🩵'];

    const PEOPLE_INITIAL = [
      { id:'p1', key:'쭈녕',  emoji:'🧡', ...GRAD_POOL[0] },
      { id:'p2', key:'현지콩', emoji:'💚', ...GRAD_POOL[1] },
    ];

    function autoEmoji(name) {
      const n = name;
      if (/서류|여권|비자|보험|문서|확인서/.test(n)) return '📄';
      if (/금융|카드|현금|환전|suica|pasmo|ic카드|페이/.test(n)) return '💳';
      if (/전자|충전|배터리|카메라|어댑터|케이블|이어폰/.test(n)) return '🔌';
      if (/앱|어플|지도|번역|예약|다운/.test(n)) return '📱';
      if (/옷|의류|신발|가방|우산|겉옷|짐|에코백/.test(n)) return '👕';
      if (/약|의약|건강|상비|반창고/.test(n)) return '💊';
      if (/화장|뷰티|스킨|코스메|선크림/.test(n)) return '💄';
      if (/간식|음식|먹을|식품/.test(n)) return '🍱';
      if (/선물|기념품|쇼핑/.test(n)) return '🎁';
      if (/사진|카메라|포토/.test(n)) return '📷';
      if (/숙소|호텔/.test(n)) return '🏨';
      if (/교통|버스|지하철|기차|비행/.test(n)) return '🚌';
      if (/세면|위생|샴푸|치약/.test(n)) return '🧴';
      return '📝';
    }

    function ChecklistView() {
      const [people, setPeople] = useState(() => {
        try {
          const saved = localStorage.getItem(PEOPLE_KEY);
          return saved ? JSON.parse(saved) : PEOPLE_INITIAL;
        } catch { return PEOPLE_INITIAL; }
      });

      const [clData, setClData] = useState(() => {
        try {
          const saved = localStorage.getItem(CL_KEY);
          return saved ? JSON.parse(saved) : CHECKLIST;
        } catch { return CHECKLIST; }
      });

      const [ck, setCk] = useState(() => {
        const init = {};
        const savedPeople = (() => {
          try { const s = localStorage.getItem(PEOPLE_KEY); return s ? JSON.parse(s) : PEOPLE_INITIAL; } catch { return PEOPLE_INITIAL; }
        })();
        savedPeople.forEach(p => {
          try {
            // id 기반 우선, 없으면 이름 기반 (구버전 호환)
            const raw = localStorage.getItem(`tokyogogo-ck-${p.id}`) || localStorage.getItem(`tokyogogo-ck-${p.key}`);
            init[p.id] = raw ? JSON.parse(raw) : {};
          } catch { init[p.id] = {}; }
        });
        return init;
      });

      const [editMode,    setEditMode]    = useState(false);
      const [newCatName,  setNewCatName]  = useState('');
      const [addingTo,    setAddingTo]    = useState(null);
      const [newItemText, setNewItemText] = useState('');

      /* ── 사람 관리 ── */
      const savePeople = (next) => { setPeople(next); localStorage.setItem(PEOPLE_KEY, JSON.stringify(next)); };

      const addPerson = () => {
        const idx      = people.length;
        const gradStyle = GRAD_POOL[idx % GRAD_POOL.length];
        const emoji    = EMOJI_POOL[idx % EMOJI_POOL.length];
        const newP     = { id: `p${Date.now()}`, key: `멤버${idx + 1}`, emoji, ...gradStyle };
        savePeople([...people, newP]);
        setCk(prev => ({ ...prev, [newP.id]: {} }));
      };

      const renamePerson = (idx, val) => {
        savePeople(people.map((p, i) => i === idx ? { ...p, key: val } : p));
      };

      const delPerson = (idx) => {
        const p = people[idx];
        savePeople(people.filter((_, i) => i !== idx));
        localStorage.removeItem(`tokyogogo-ck-${p.id}`);
        setCk(prev => { const next = { ...prev }; delete next[p.id]; return next; });
      };

      /* ── 체크리스트 관리 ── */
      const saveCl = (data) => { setClData(data); localStorage.setItem(CL_KEY, JSON.stringify(data)); };

      const toggle = (pid, k) => setCk(prev => {
        const next = { ...prev, [pid]: { ...prev[pid], [k]: !prev[pid]?.[k] } };
        localStorage.setItem(`tokyogogo-ck-${pid}`, JSON.stringify(next[pid]));
        return next;
      });

      const addCat = () => {
        const name = newCatName.trim(); if (!name) return;
        saveCl([...clData, { id: Date.now(), cat: `${autoEmoji(name)} ${name}`, items: [] }]);
        setNewCatName('');
      };

      const delCat  = (id) => saveCl(clData.filter(c => c.id !== id));
      const addItem = (catId) => {
        const text = newItemText.trim(); if (!text) return;
        saveCl(clData.map(c => c.id === catId ? { ...c, items: [...c.items, text] } : c));
        setNewItemText(''); setAddingTo(null);
      };
      const delItem = (catId, idx) =>
        saveCl(clData.map(c => c.id === catId ? { ...c, items: c.items.filter((_, i) => i !== idx) } : c));

      const total = clData.reduce((s, c) => s + c.items.length, 0);

      // 컬럼 수에 따라 grid 클래스
      const gridCls = people.length === 1 ? 'grid-cols-1' : people.length === 2 ? 'grid-cols-2' : people.length === 3 ? 'grid-cols-3' : 'grid-cols-2 sm:grid-cols-4';

      return (
        <div className="fade-in pb-24 pt-4 px-3">
          <div className="max-w-2xl mx-auto">

            {/* 상단 툴바 */}
            <div className="flex items-center justify-between mb-3">
              <p className="text-xs text-gray-400">
                {editMode ? '멤버·카테고리·항목을 자유롭게 편집하세요' : '각자 체크하며 준비해요 ✈️'}
              </p>
              <button onClick={() => setEditMode(v => !v)}
                className={`text-xs font-bold px-3 py-1.5 rounded-lg border transition-all
                  ${editMode ? 'bg-blue-500 text-white border-blue-500' : 'bg-white text-gray-500 border-gray-200 hover:border-blue-300'}`}>
                {editMode ? '✅ 완료' : '✏️ 편집'}
              </button>
            </div>

            {/* ── 멤버 관리 (편집 모드) ── */}
            {editMode && (
              <div className="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden mb-4">
                <div className="px-3 py-2 bg-gray-50 border-b border-gray-100 flex items-center justify-between">
                  <span className="font-bold text-gray-700 text-sm">👥 여행 멤버</span>
                  <span className="text-xs text-gray-400">{people.length}명</span>
                </div>
                <div className="p-3 space-y-2">
                  {people.map((p, i) => (
                    <div key={p.id} className="flex items-center gap-2">
                      <div className="w-3 h-3 rounded-full shrink-0" style={{ background: p.hex }} />
                      <span className="text-base shrink-0">{p.emoji}</span>
                      <input value={p.key} onChange={e => renamePerson(i, e.target.value)}
                        className="flex-1 text-sm border border-gray-200 rounded-lg px-2.5 py-1.5 focus:outline-none focus:ring-2 focus:ring-blue-300 min-w-0"
                        placeholder="이름" />
                      {people.length > 1 && (
                        <button onClick={() => { if (confirm(`'${p.key}'을(를) 삭제할까요?`)) delPerson(i); }}
                          className="shrink-0 text-xs text-red-300 hover:text-red-500 hover:bg-red-50 px-2 py-1 rounded transition-all">
                          ✕
                        </button>
                      )}
                    </div>
                  ))}
                  <button onClick={addPerson}
                    className="w-full text-xs text-blue-400 hover:text-blue-600 py-1.5 border border-dashed border-blue-200 rounded-lg hover:border-blue-400 transition-all">
                    + 멤버 추가
                  </button>
                </div>
              </div>
            )}

            {/* 진행률 (일반 모드) */}
            {!editMode && (
              <div className={`grid ${gridCls} gap-2 mb-4`}>
                {people.map(p => {
                  const done = Object.values(ck[p.id] || {}).filter(Boolean).length;
                  const pct  = total > 0 ? Math.round((done / total) * 100) : 0;
                  return (
                    <div key={p.id} className="bg-white rounded-xl border border-gray-100 shadow-sm p-3">
                      <div className="flex items-center justify-between mb-1.5">
                        <span className="font-extrabold text-gray-700 text-sm truncate">{p.emoji} {p.key}</span>
                        <span className="font-extrabold text-sm shrink-0 ml-1" style={{ color: p.hex }}>{pct}%</span>
                      </div>
                      <div className="w-full bg-gray-100 rounded-full h-2 overflow-hidden">
                        <div className={`bg-gradient-to-r ${p.grad} h-2 rounded-full transition-all duration-500`}
                          style={{ width: `${pct}%` }} />
                      </div>
                      <div className="text-xs text-gray-400 mt-1">{done}/{total} 완료</div>
                      {done === total && total > 0 && (
                        <div className="text-xs font-bold mt-1 animate-bounce" style={{ color: p.hex }}>🎉 준비 완료!</div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}

            {/* 카테고리 목록 */}
            {clData.map(c => (
              <div key={c.id} className="mb-3">
                {editMode ? (
                  <div className="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
                    <div className="flex items-center justify-between px-3 py-2 bg-gray-50 border-b border-gray-100">
                      <span className="font-bold text-gray-700 text-sm">{c.cat}</span>
                      <button onClick={() => { if (confirm(`'${c.cat}' 카테고리를 삭제할까요?`)) delCat(c.id); }}
                        className="text-xs text-red-400 hover:text-red-600 font-bold px-2 py-0.5 rounded hover:bg-red-50 transition-all">
                        🗑️ 삭제
                      </button>
                    </div>
                    <div className="p-2 space-y-1">
                      {c.items.map((item, i) => (
                        <div key={i} className="flex items-center gap-2">
                          <span className="flex-1 text-sm text-gray-700 py-0.5">{item}</span>
                          <button onClick={() => delItem(c.id, i)}
                            className="shrink-0 w-5 h-5 flex items-center justify-center text-red-300 hover:text-red-500 hover:bg-red-50 rounded transition-all text-xs">✕</button>
                        </div>
                      ))}
                      {c.items.length === 0 && <p className="text-xs text-gray-300 text-center py-1">항목 없음</p>}
                      {addingTo === c.id ? (
                        <div className="flex gap-1.5 mt-1.5">
                          <input autoFocus value={newItemText} onChange={e => setNewItemText(e.target.value)}
                            onKeyDown={e => { if (e.key==='Enter') addItem(c.id); if (e.key==='Escape') { setAddingTo(null); setNewItemText(''); } }}
                            placeholder="항목 입력 후 Enter"
                            className="flex-1 text-sm border border-gray-200 rounded-lg px-2.5 py-1.5 focus:outline-none focus:ring-2 focus:ring-blue-300" />
                          <button onClick={() => addItem(c.id)} className="text-xs font-bold bg-blue-500 text-white px-2.5 py-1.5 rounded-lg">추가</button>
                          <button onClick={() => { setAddingTo(null); setNewItemText(''); }} className="text-xs text-gray-400 px-1.5">✕</button>
                        </div>
                      ) : (
                        <button onClick={() => { setAddingTo(c.id); setNewItemText(''); }}
                          className="w-full text-xs text-blue-400 hover:text-blue-600 py-1.5 border border-dashed border-blue-200 rounded-lg hover:border-blue-400 transition-all mt-1">
                          + 항목 추가
                        </button>
                      )}
                    </div>
                  </div>
                ) : (
                  <>
                    <h3 className="font-bold text-gray-600 text-xs mb-1.5 px-1">{c.cat}</h3>
                    <div className={`grid ${gridCls} gap-2`}>
                      {people.map(p => (
                        <div key={p.id} className="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
                          <div className={`bg-gradient-to-r ${p.grad} text-white text-xs font-extrabold px-2 py-1.5 text-center truncate`}>
                            {p.emoji} {p.key}
                          </div>
                          <div className="p-2 space-y-1.5">
                            {c.items.map((item, i) => {
                              const k  = `${c.id}-${i}`;
                              const on = !!(ck[p.id] || {})[k];
                              return (
                                <label key={i} className="flex items-start gap-1.5 cursor-pointer group">
                                  <button onClick={() => toggle(p.id, k)}
                                    className={`w-4 h-4 rounded border-2 flex items-center justify-center shrink-0 mt-0.5 transition-all
                                      ${on ? p.active : `border-gray-300 ${p.hover}`}`}>
                                    {on && <span className="text-white font-extrabold" style={{fontSize:'9px'}}>✓</span>}
                                  </button>
                                  <span className={`text-xs leading-snug transition-all ${on ? 'text-gray-300 line-through' : 'text-gray-600'}`}>
                                    {item}
                                  </span>
                                </label>
                              );
                            })}
                            {c.items.length === 0 && <p className="text-xs text-gray-300 text-center py-1">항목 없음</p>}
                          </div>
                        </div>
                      ))}
                    </div>
                  </>
                )}
              </div>
            ))}

            {/* 카테고리 추가 (편집 모드) */}
            {editMode && (
              <div className="bg-white rounded-xl border border-gray-100 shadow-sm p-3 mb-3">
                <p className="text-xs font-bold text-gray-500 mb-2">➕ 새 카테고리 추가</p>
                <div className="flex gap-2">
                  <input value={newCatName} onChange={e => setNewCatName(e.target.value)}
                    onKeyDown={e => { if (e.key==='Enter') addCat(); }}
                    placeholder="이름 입력 (이모티콘 자동 추가)"
                    className="flex-1 text-sm border border-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-300" />
                  <button onClick={addCat} className="text-xs font-bold bg-blue-500 text-white px-3 py-2 rounded-lg whitespace-nowrap">추가</button>
                </div>
                {newCatName.trim() && (
                  <p className="text-xs text-gray-400 mt-1.5">
                    미리보기: <span className="font-bold text-gray-700">{autoEmoji(newCatName)} {newCatName}</span>
                  </p>
                )}
              </div>
            )}

            {/* 초기화 (편집 모드) */}
            {editMode && (
              <button onClick={() => {
                if (confirm('준비물 목록과 멤버를 모두 초기화할까요?')) {
                  localStorage.removeItem(CL_KEY);
                  localStorage.removeItem(PEOPLE_KEY);
                  setClData(CHECKLIST);
                  setPeople(PEOPLE_INITIAL);
                  setCk({ p1:{}, p2:{} });
                }
              }}
                className="w-full py-2.5 rounded-xl text-sm font-bold text-red-400 hover:text-red-600 hover:bg-red-50 border border-red-100 transition-all">
                🔄 초기 상태로 되돌리기
              </button>
            )}

          </div>
        </div>
      );
    }

    /* ─────────────── 메인 앱 ─────────────── */

    const TABS = [
      { id:'home',      icon:'🏠', label:'홈' },
      { id:'d0',        icon:'✈️', label:'Day1' },
      { id:'d1',        icon:'🌃', label:'Day2' },
      { id:'d2',        icon:'🌸', label:'Day3' },
      { id:'d3',        icon:'🏠', label:'Day4' },
      { id:'checklist', icon:'✅', label:'준비물' },
      { id:'edit',      icon:'✏️', label:'편집' },
    ];

    function App() {
      const [tab, setTab] = useState('home');

      const DATA_VERSION = '2025-v2'; // 데이터 구조 변경 시 버전 올리기
      const [travelData, setTravelData] = useState(() => {
        try {
          const ver   = localStorage.getItem('tokyogogo-version');
          const saved = localStorage.getItem('tokyogogo-travel');
          if (saved && ver === DATA_VERSION) return JSON.parse(saved);
          // 버전 불일치 or 저장 없음 → 초기 데이터
          localStorage.setItem('tokyogogo-version', DATA_VERSION);
          localStorage.removeItem('tokyogogo-travel');
          return TRAVEL_INITIAL;
        } catch { return TRAVEL_INITIAL; }
      });

      const saveTravel = useCallback((data) => {
        setTravelData(data);
        localStorage.setItem('tokyogogo-travel', JSON.stringify(data));
      }, []);

      const handleSavePlace = (dayIdx, updated) => {
        const next = travelData.map((day, di) =>
          di !== dayIdx ? day : { ...day, places: day.places.map(p => p.id === updated.id ? updated : p) }
        );
        saveTravel(next);
      };

      const handleDeletePlace = (dayIdx, id) => {
        const next = travelData.map((day, di) =>
          di !== dayIdx ? day : { ...day, places: day.places.filter(p => p.id !== id) }
        );
        saveTravel(next);
      };

      const handleAddPlace = (dayIdx, newPlace) => {
        const next = travelData.map((day, di) =>
          di !== dayIdx ? day : { ...day, places: [...day.places, newPlace] }
        );
        saveTravel(next);
      };

      const handleReset = () => {
        localStorage.removeItem('tokyogogo-travel');
        setTravelData(TRAVEL_INITIAL);
      };

      return (
        <div className="min-h-screen bg-slate-50">
          <header className="bg-gradient-to-r from-rose-500 via-pink-500 to-orange-400 text-white shadow-xl sticky top-0 z-50">
            <div className="max-w-3xl mx-auto px-4 pt-safe">
              <div className="flex items-center gap-3 py-3 border-b border-white/20">
                <span className="text-2xl">🌸</span>
                <div className="flex-1 min-w-0">
                  <h1 className="font-extrabold text-base sm:text-lg leading-tight truncate">{TRIP.title}</h1>
                  <p className="text-pink-100 text-xs">{TRIP.dates} · {TRIP.nights}</p>
                </div>
                <div className="text-right shrink-0">
                  <div className="text-xs bg-white/20 rounded-full px-2.5 py-1 font-bold">🏨 아카사카</div>
                </div>
              </div>
              <div className="flex gap-0.5 py-2 overflow-x-auto scrollbar-hide">
                {TABS.map(t => (
                  <button key={t.id} onClick={() => setTab(t.id)}
                    className={`tab-btn flex-1 min-w-[44px] flex flex-col items-center py-1.5 px-1 rounded-lg text-xs font-bold
                      ${tab === t.id ? 'bg-white/30 text-white shadow-sm scale-105' : 'text-white/60 hover:bg-white/15 hover:text-white'}`}>
                    <span className="text-sm">{t.icon}</span>
                    <span className="mt-0.5 text-xs">{t.label}</span>
                  </button>
                ))}
              </div>
            </div>
          </header>

          <main className="max-w-3xl mx-auto">
            <HomeView onDay={setTab} show={tab === 'home'} travelData={travelData} />
            {tab === 'd0' && <DayView idx={0} travelData={travelData} />}
            {tab === 'd1' && <DayView idx={1} travelData={travelData} />}
            {tab === 'd2' && <DayView idx={2} travelData={travelData} />}
            {tab === 'd3' && <DayView idx={3} travelData={travelData} />}
            {tab === 'checklist' && <ChecklistView />}
            {tab === 'edit' && (
              <EditView
                travelData={travelData}
                onSavePlace={handleSavePlace}
                onDeletePlace={handleDeletePlace}
                onAddPlace={handleAddPlace}
                onReset={handleReset}
              />
            )}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
