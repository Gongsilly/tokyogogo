    function compressImage(file, maxWidth = 1200, quality = 0.82) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            let w = img.width, h = img.height;
            if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL('image/jpeg', quality));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

        detail: initPlace.detail || '',
        cat:    initPlace.cat    || '관광',
        map:    initPlace.map    || '',
      });
      const [images, setImages]     = useState([]);
      const [uploading, setUploading] = useState(false);
      const [saving, setSaving]     = useState(false);
      const fileInputRef = useRef(null);

      const set = (k, v) => setForm(p => ({ ...p, [k]: v }));
      const url = `https://www.google.com/maps/search/${encodeURIComponent(place.map || place.name)}`;
      const currentCat = CAT[editMode ? form.cat : place.cat] || {};

      useEffect(() => {
        fetch(`/api/places/${place.id}/images`)
          .then(r => r.json())
          .then(data => setImages(Array.isArray(data) ? data : []))
          .catch(() => {});
      }, [place.id]);

      const handleUpload = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setUploading(true);
        try {
          const data = await compressImage(file);
          const res = await fetch(`/api/images/${place.id}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ filename: file.name, data }),
          });
          const { id } = await res.json();
          setImages(prev => [...prev, { id, filename: file.name, data }]);
        } finally {
          setUploading(false);
          e.target.value = '';
        }
      };

      const handleDeleteImage = async (imgId) => {
        if (!confirm('이미지를 삭제할까요?')) return;
        await fetch(`/api/images/${imgId}`, { method: 'DELETE' });
        setImages(prev => prev.filter(i => i.id !== imgId));
      };

      const handleSave = async () => {
        if (!form.name.trim()) { alert('장소명을 입력해주세요.'); return; }
        setSaving(true);
        try {
          const updated = { ...place, ...form };
          await onSave(dayIdx, updated);
          setPlace(updated);
          setEditMode(false);
        } finally {
          setSaving(false);
        }
      };

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal-box fade-in" onClick={e => e.stopPropagation()} style={{ maxWidth: 400 }}>

            {/* 헤더 */}
            <div className={`bg-gradient-to-r ${dayConfig.grad} rounded-xl p-4 mb-4`}>
              <div className="flex items-center justify-between mb-2">
                <span className="text-xs font-bold text-white/80">{dayConfig.day} · {dayConfig.date} ({dayConfig.week})</span>
                <div className="flex items-center gap-2">
                  {!editMode && (
                    <button onClick={() => setEditMode(true)}
                      className="text-xs font-bold bg-white/25 hover:bg-white/40 text-white px-2.5 py-1 rounded-lg transition-all">
                      ✏️ 수정
                    </button>

                  <button onClick={onClose} className="text-white/70 hover:text-white text-xl leading-none">✕</button>
                </div>
              </div>
              <div className="text-3xl mb-1">{currentCat.icon || '📍'}</div>
              {editMode ? (
                <input value={form.name} onChange={e => set('name', e.target.value)}
                  className="font-extrabold text-white bg-white/20 rounded-lg px-3 py-1.5 text-base w-full placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-white/50 mb-1"
                  placeholder="장소명" />
              ) : (
                <div className="font-extrabold text-white text-lg leading-tight">{place.name}</div>
              )}
              {editMode ? (
                <input value={form.time} onChange={e => set('time', e.target.value)}
                  className="text-white bg-white/20 rounded-lg px-3 py-1 text-sm w-full mt-1 placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-white/40"
                  placeholder="시간 (예: 14:00)" />
              ) : (
                place.time && <div className="text-white/80 text-sm mt-1">⏰ {place.time}</div>
              )}
            </div>

            {/* 편집 필드 */}
            {editMode ? (
              <div className="space-y-3 mb-4">
                <div>
                  <label className="text-xs font-bold text-gray-500 mb-1 block">카테고리</label>
                  <select value={form.cat} onChange={e => set('cat', e.target.value)}
                    className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300 bg-white">
                    {Object.entries(CAT).map(([k, v]) => (

                    ))}
                  </select>
                </div>
                <div>
                  <label className="text-xs font-bold text-gray-500 mb-1 block">설명 · 메모</label>
                  <textarea value={form.detail} onChange={e => set('detail', e.target.value)}
                    rows={3}
                    className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300 resize-none"
                    placeholder="예약 정보, 메모 등 자유롭게 입력하세요" />
                </div>
                <div>
                  <label className="text-xs font-bold text-gray-500 mb-1 block">구글맵 검색어</label>
                  <input value={form.map} onChange={e => set('map', e.target.value)}
                    className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"
                    placeholder="예) Ginza Loft Tokyo" />
                </div>
              </div>
            ) : (
              <>
                <div className="mb-3"><CatBadge cat={place.cat} /></div>
                {place.detail && (
                  <div className="bg-gray-50 rounded-xl p-3 mb-4">
                    <p className="text-sm text-gray-700 leading-relaxed">{place.detail}</p>
                  </div>
                )}
              </>
            )}

            {/* 이미지 섹션 */}
            <div className="mb-4">
              <div className="flex items-center justify-between mb-2">
                <span className="text-xs font-bold text-gray-600">📸 사진 · 예약 바우처</span>
                <button
                  onClick={() => fileInputRef.current?.click()}
                  disabled={uploading}
                  className="text-xs font-bold text-blue-500 hover:text-blue-700 bg-blue-50 hover:bg-blue-100 px-2.5 py-1 rounded-lg border border-blue-100 transition-all disabled:opacity-50">
                  {uploading ? '⏳ 업로드 중...' : '+ 추가'}
                </button>
                <input ref={fileInputRef} type="file" accept="image/*" className="hidden" onChange={handleUpload} />
              </div>
              {images.length === 0 ? (
                <div
                  className="border-2 border-dashed border-gray-200 rounded-xl p-5 text-center cursor-pointer hover:border-blue-200 transition-all"
                  onClick={() => fileInputRef.current?.click()}>
                  <div className="text-2xl mb-1">📷</div>
                  <p className="text-xs text-gray-400">예약 바우처나 사진을 추가해보세요</p>
                </div>
              ) : (
                <div className="grid grid-cols-2 gap-2">
                  {images.map(img => (
                    <div key={img.id} className="relative group rounded-xl overflow-hidden bg-gray-100" style={{ aspectRatio: '4/3' }}>
                      <img src={img.data} alt={img.filename} className="w-full h-full object-cover" />
                      <button
                        onClick={() => handleDeleteImage(img.id)}
                        className="absolute top-1.5 right-1.5 w-6 h-6 bg-black/60 hover:bg-red-500 text-white rounded-full text-xs flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all">
                        ✕
                      </button>
                    </div>
                  ))}
                  <div
                    className="flex flex-col items-center justify-center border-2 border-dashed border-gray-200 rounded-xl cursor-pointer hover:border-blue-300 transition-all text-gray-300 hover:text-blue-400"
                    style={{ aspectRatio: '4/3' }}
                    onClick={() => fileInputRef.current?.click()}>
                    <span className="text-2xl">+</span>
                    <span className="text-xs mt-0.5">추가</span>
                  </div>
                </div>
              )}
            </div>

            {/* 하단 버튼 */}
            {editMode ? (
              <div className="flex gap-2">
                <button onClick={() => setEditMode(false)}
                  className="flex-1 py-2.5 rounded-xl text-sm font-bold bg-gray-100 text-gray-600 hover:bg-gray-200 transition-all">
                  취소
                </button>
                <button onClick={handleSave} disabled={saving}
                  className="flex-1 py-2.5 rounded-xl text-sm font-bold text-white transition-all disabled:opacity-60"
                  style={{ background: dayConfig.color }}>
                  {saving ? '저장 중...' : '✅ 저장'}
                </button>
              </div>
            ) : (
              <a href={url} target="_blank" rel="noopener noreferrer"
                className="flex items-center justify-center gap-2 w-full py-3 rounded-xl font-bold text-sm text-white transition-all"
                style={{ background: dayConfig.color }}>
                📍 구글맵에서 보기
              </a>
            )}
          </div>
        </div>
      );
    }

    /* ── 편집 모달 ── */

    /* ── Leaflet 지도 (동적 업데이트) ── */
    /* ── Google Maps 지도 ── */
    function TravelMap({ show, travelData, visibleDays }) {
      const mapRef         = useRef(null);
      const mapInst        = useRef(null);
      const overlaysRef    = useRef([]);
      const infoWindowRef  = useRef(null);
      const travelDataRef  = useRef(travelData);
      const visibleDaysRef = useRef(visibleDays);
      const pendingUpdate  = useRef(false);

      travelDataRef.current  = travelData;
      visibleDaysRef.current = visibleDays;

      const makeSvgUrl = (emoji, bgColor, size, strokeColor) => {
        const s = size;
        return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(
          `<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}" viewBox="0 0 ${s} ${s}">
            <circle cx="${s/2}" cy="${s/2}" r="${s/2-1}" fill="${bgColor}" stroke="${strokeColor||'white'}" stroke-width="2.5"/>
            <text x="${s/2}" y="${s/2+4}" text-anchor="middle" font-size="${s*0.45}">${emoji}</text>
          </svg>`
        )}`;
      };

      const applyLayers = useCallback((map) => {
        // 기존 오버레이 제거
        overlaysRef.current.forEach(o => o.setMap(null));
        overlaysRef.current = [];
        if (infoWindowRef.current) infoWindowRef.current.close();
        const infoWindow = infoWindowRef.current || (infoWindowRef.current = new google.maps.InfoWindow());

        travelDataRef.current.forEach((day, di) => {
          if (!visibleDaysRef.current[di]) return;
          const cfg     = DAY_CFG[di];
          const color   = cfg.color;
          const withPos = day.places.filter(p => p.pos && Array.isArray(p.pos) && p.pos.length === 2);
          if (withPos.length === 0) return;

          // 루트 선
          if (withPos.length > 1) {
            const isDashed = di === 0 || di === 3;
            const polyline = new google.maps.Polyline({
              path: withPos.map(p => ({ lat: p.pos[0], lng: p.pos[1] })),
              geodesic: false,
              strokeColor: color,
              strokeOpacity: isDashed ? 0 : 0.8,
              strokeWeight: 5,
              icons: isDashed ? [{ icon: { path: 'M 0,-1 0,1', strokeOpacity: 1, scale: 4 }, offset: '0', repeat: '16px' }] : [],
              map,
            });
            overlaysRef.current.push(polyline);
          }

          // 장소 마커
          withPos.forEach(place => {
            const catIcon = CAT[place.cat]?.icon || '📍';
            const marker = new google.maps.Marker({
              position: { lat: place.pos[0], lng: place.pos[1] },
              map,
              icon: { url: makeSvgUrl(catIcon, color, 30, '#fff'), scaledSize: new google.maps.Size(30, 30), anchor: new google.maps.Point(15, 15) },
            });
            marker.addListener('click', () => {
              infoWindow.setContent(`<div style="font-family:'Noto Sans KR',sans-serif;min-width:140px;">
                <div style="font-weight:800;color:${color};font-size:12px;margin-bottom:4px;">${cfg.day} · ${cfg.date}</div>
                <div style="font-weight:700;font-size:14px;margin-bottom:2px;">${place.name}</div>
                <div style="color:#6b7280;font-size:12px;">⏰ ${place.time}</div>
                <div style="color:#9ca3af;font-size:11px;margin-top:2px;">${place.detail}</div>
              </div>`);
              infoWindow.open(map, marker);
            });
            overlaysRef.current.push(marker);
          });
        });

        // 호텔 고정 마커
        const hotelSvg = `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(
          `<svg xmlns="http://www.w3.org/2000/svg" width="40" height="46" viewBox="0 0 40 46">
            <circle cx="20" cy="20" r="18" fill="white" stroke="#f43f5e" stroke-width="3"/>
            <text x="20" y="27" text-anchor="middle" font-size="18">🏨</text>
            <rect x="3" y="36" width="34" height="10" rx="4" fill="#f43f5e"/>
            <text x="20" y="44" text-anchor="middle" font-size="9" fill="white" font-weight="bold" font-family="sans-serif">숙소</text>
          </svg>`
        )}`;
        const hotelMarker = new google.maps.Marker({
          position: { lat: HOTEL_POS[0], lng: HOTEL_POS[1] },
          map, zIndex: 1000,
          icon: { url: hotelSvg, scaledSize: new google.maps.Size(40, 46), anchor: new google.maps.Point(20, 46) },
        });
        hotelMarker.addListener('click', () => {
          infoWindow.setContent(`<div style="font-family:'Noto Sans KR',sans-serif;min-width:180px;">
            <div style="font-weight:800;color:#f43f5e;font-size:13px;margin-bottom:4px;">🏨 숙소 (매일 베이스캠프)</div>
            <div style="font-weight:700;font-size:14px;margin-bottom:2px;">아카사카 어반 호텔 신관</div>
            <div style="color:#6b7280;font-size:12px;">4/10 체크인 · 4/13 체크아웃</div>
          </div>`);
          infoWindow.open(map, hotelMarker);
        });
        overlaysRef.current.push(hotelMarker);

        // 나리타공항 고정 마커
        const nrtSvg = `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(
          `<svg xmlns="http://www.w3.org/2000/svg" width="36" height="42" viewBox="0 0 36 42">
            <circle cx="18" cy="18" r="16" fill="white" stroke="#8B5CF6" stroke-width="3"/>
            <text x="18" y="25" text-anchor="middle" font-size="16">✈️</text>
            <rect x="2" y="33" width="32" height="9" rx="4" fill="#8B5CF6"/>
            <text x="18" y="40" text-anchor="middle" font-size="9" fill="white" font-weight="bold" font-family="sans-serif">NRT</text>
          </svg>`
        )}`;
        const nrtMarker = new google.maps.Marker({
          position: { lat: NRT_POS[0], lng: NRT_POS[1] },
          map, zIndex: 900,
          icon: { url: nrtSvg, scaledSize: new google.maps.Size(36, 42), anchor: new google.maps.Point(18, 42) },
        });
        nrtMarker.addListener('click', () => {
          infoWindow.setContent(`<div style="font-family:'Noto Sans KR',sans-serif;min-width:160px;">
            <div style="font-weight:800;color:#8B5CF6;font-size:13px;margin-bottom:4px;">✈️ 나리타국제공항 (NRT)</div>
            <div style="font-size:12px;color:#374151;">🛬 Day1 LJ209 · 17:15 도착</div>
            <div style="font-size:12px;color:#374151;">🛫 Day4 LJ212 · 19:15 출발</div>
          </div>`);
          infoWindow.open(map, nrtMarker);
        });
        overlaysRef.current.push(nrtMarker);

        // 전체 범위 맞춤
        const bounds = new google.maps.LatLngBounds();
        bounds.extend({ lat: 35.54, lng: 139.55 });
        bounds.extend({ lat: 35.82, lng: 140.50 });
        map.fitBounds(bounds);
      }, []);

      // 지도 초기화 — 레이스 컨디션 방지: window.google 직접 폴링
      useEffect(() => {
        if (mapInst.current) return;

        const doInit = () => {
          if (mapInst.current || !mapRef.current) return;
          const map = new google.maps.Map(mapRef.current, {
            center: { lat: 35.675, lng: 139.720 },
            zoom: 13,
            mapTypeId: 'roadmap',
            gestureHandling: 'greedy',
          });
          mapInst.current = map;
          applyLayers(map);
        };

        if (window.google && window.google.maps) {
          doInit();
        } else {
          const handler = () => doInit();
          window.addEventListener('google-maps-ready', handler);
          // 혹시 이미 로드됐지만 이벤트 놓친 경우 폴백 폴링
          const poll = setInterval(() => {
            if (window.google && window.google.maps) {
              clearInterval(poll);
              window.removeEventListener('google-maps-ready', handler);
              doInit();
            }
          }, 200);
          return () => {
            window.removeEventListener('google-maps-ready', handler);
            clearInterval(poll);
          };
        }
      }, []);

      // travelData 또는 visibleDays 변경 시 레이어 업데이트
      useEffect(() => {
        if (!mapInst.current) return;
        if (!show) {
          pendingUpdate.current = true;
          return;
        }
        applyLayers(mapInst.current);
      }, [travelData, visibleDays]);

      // 홈탭 진입 시: resize + 대기 중인 업데이트 처리
      useEffect(() => {
        if (!show || !mapInst.current) return;

        const t1 = setTimeout(() => {
          if (!mapInst.current) return;
          google.maps.event.trigger(mapInst.current, 'resize');
          if (pendingUpdate.current) {
            pendingUpdate.current = false;
            applyLayers(mapInst.current);
          }
        }, 50);

        const t2 = setTimeout(() => {
          if (mapInst.current) google.maps.event.trigger(mapInst.current, 'resize');
        }, 300);

        return () => { clearTimeout(t1); clearTimeout(t2); };
      }, [show]);

      return <div ref={mapRef} id="google-map" className="w-full" />;
    }

    /* ── 홈 뷰 ── */
    function HomeView({ onDay, show, travelData }) {
      const [visibleDays, setVisibleDays] = useState([true, true, true, true]);
      const allPlaces = travelData.flatMap(d => d.places);
      const total  = allPlaces.length;
      const counts = Object.fromEntries(Object.keys(CAT).map(k => [k, allPlaces.filter(p => p.cat === k).length]));

      const toggleDay = (i) => setVisibleDays(v => v.map((x, idx) => idx === i ? !x : x));
      const allOn  = visibleDays.every(Boolean);
      const allOff = visibleDays.every(v => !v);

    /* ── 체크리스트 뷰 ── */
    const CL_KEY      = 'tokyogogo-checklist-data';
    const PEOPLE_KEY  = 'tokyogogo-people';

    const GRAD_POOL = [
      { grad:'from-violet-500 to-purple-600', active:'bg-violet-500 border-violet-500', hover:'group-hover:border-violet-400', hex:'#8B5CF6' },
      { grad:'from-pink-500 to-rose-500',     active:'bg-pink-500 border-pink-500',     hover:'group-hover:border-pink-400',   hex:'#EC4899' },
      { grad:'from-blue-500 to-indigo-500',   active:'bg-blue-500 border-blue-500',     hover:'group-hover:border-blue-400',   hex:'#3B82F6' },
      { grad:'from-amber-500 to-orange-500',  active:'bg-amber-500 border-amber-500',   hover:'group-hover:border-amber-400',  hex:'#F59E0B' },
      { grad:'from-emerald-500 to-teal-500',  active:'bg-emerald-500 border-emerald-500', hover:'group-hover:border-emerald-400', hex:'#10B981' },
      { grad:'from-rose-500 to-red-500',      active:'bg-rose-500 border-rose-500',     hover:'group-hover:border-rose-400',   hex:'#F43F5E' },
    ];
    const EMOJI_POOL = ['🧡','💚','💙','💛','🩷','💜','🤍','🩵'];

    const PEOPLE_INITIAL = [
      { id:'p1', key:'쭈녕',  emoji:'🧡', ...GRAD_POOL[0] },
      { id:'p2', key:'현지콩', emoji:'💚', ...GRAD_POOL[1] },
    ];

    function autoEmoji(name) {
      const n = name;
      if (/서류|여권|비자|보험|문서|확인서/.test(n)) return '📄';
      if (/금융|카드|현금|환전|suica|pasmo|ic카드|페이/.test(n)) return '💳';
      if (/전자|충전|배터리|카메라|어댑터|케이블|이어폰/.test(n)) return '🔌';
      if (/앱|어플|지도|번역|예약|다운/.test(n)) return '📱';
      if (/옷|의류|신발|가방|우산|겉옷|짐|에코백/.test(n)) return '👕';
      if (/약|의약|건강|상비|반창고/.test(n)) return '💊';
      if (/화장|뷰티|스킨|코스메|선크림/.test(n)) return '💄';
      if (/간식|음식|먹을|식품/.test(n)) return '🍱';
      if (/선물|기념품|쇼핑/.test(n)) return '🎁';
      if (/사진|카메라|포토/.test(n)) return '📷';
      if (/숙소|호텔/.test(n)) return '🏨';
      if (/교통|버스|지하철|기차|비행/.test(n)) return '🚌';
      if (/세면|위생|샴푸|치약/.test(n)) return '🧴';
      return '📝';
    }

    function ChecklistView({ dbData }) {
      const CHECKLIST_DATA = dbData || CHECKLIST;
      const [people, setPeople] = useState(() => {
        try {
          const saved = localStorage.getItem(PEOPLE_KEY);
          return saved ? JSON.parse(saved) : PEOPLE_INITIAL;
        } catch { return PEOPLE_INITIAL; }
      });

      const [clData, setClData] = useState(() => {
        try {
          const saved = localStorage.getItem(CL_KEY);
          return saved ? JSON.parse(saved) : CHECKLIST_DATA;
        } catch { return CHECKLIST_DATA; }
      });

      const [ck, setCk] = useState(() => {
        const init = {};
        const savedPeople = (() => {
          try { const s = localStorage.getItem(PEOPLE_KEY); return s ? JSON.parse(s) : PEOPLE_INITIAL; } catch { return PEOPLE_INITIAL; }
        })();
        savedPeople.forEach(p => {
          try {
            // id 기반 우선, 없으면 이름 기반 (구버전 호환)
            const raw = localStorage.getItem(`tokyogogo-ck-${p.id}`) || localStorage.getItem(`tokyogogo-ck-${p.key}`);
            init[p.id] = raw ? JSON.parse(raw) : {};
          } catch { init[p.id] = {}; }
        });
        return init;
      });

      const [editMode,    setEditMode]    = useState(false);
      const [newCatName,  setNewCatName]  = useState('');
      const [addingTo,    setAddingTo]    = useState(null);
      const [newItemText, setNewItemText] = useState('');

      /* ── 사람 관리 ── */
      const savePeople = (next) => { setPeople(next); localStorage.setItem(PEOPLE_KEY, JSON.stringify(next)); };

      const addPerson = () => {
        const idx      = people.length;
        const gradStyle = GRAD_POOL[idx % GRAD_POOL.length];
        const emoji    = EMOJI_POOL[idx % EMOJI_POOL.length];
        const newP     = { id: `p${Date.now()}`, key: `멤버${idx + 1}`, emoji, ...gradStyle };
        savePeople([...people, newP]);
        setCk(prev => ({ ...prev, [newP.id]: {} }));
      };

      const renamePerson = (idx, val) => {
        savePeople(people.map((p, i) => i === idx ? { ...p, key: val } : p));
      };

      const delPerson = (idx) => {
        const p = people[idx];
        savePeople(people.filter((_, i) => i !== idx));
        localStorage.removeItem(`tokyogogo-ck-${p.id}`);
        setCk(prev => { const next = { ...prev }; delete next[p.id]; return next; });
      };

      /* ── 체크리스트 관리 ── */
      const saveCl = (data) => { setClData(data); localStorage.setItem(CL_KEY, JSON.stringify(data)); };

      const toggle = (pid, k) => setCk(prev => {
        const next = { ...prev, [pid]: { ...prev[pid], [k]: !prev[pid]?.[k] } };
        localStorage.setItem(`tokyogogo-ck-${pid}`, JSON.stringify(next[pid]));
        return next;
      });

      const addCat = () => {
        const name = newCatName.trim(); if (!name) return;
        saveCl([...clData, { id: Date.now(), cat: `${autoEmoji(name)} ${name}`, items: [] }]);
        setNewCatName('');
      };

      const delCat  = (id) => saveCl(clData.filter(c => c.id !== id));
      const addItem = (catId) => {
        const text = newItemText.trim(); if (!text) return;
        saveCl(clData.map(c => c.id === catId ? { ...c, items: [...c.items, text] } : c));
        setNewItemText(''); setAddingTo(null);
      };
      const delItem = (catId, idx) =>
        saveCl(clData.map(c => c.id === catId ? { ...c, items: c.items.filter((_, i) => i !== idx) } : c));

      const total = clData.reduce((s, c) => s + c.items.length, 0);

      // 컬럼 수에 따라 grid 클래스
      const gridCls = people.length === 1 ? 'grid-cols-1' : people.length === 2 ? 'grid-cols-2' : people.length === 3 ? 'grid-cols-3' : 'grid-cols-2 sm:grid-cols-4';

      return (
        <div className="fade-in pb-24 pt-4 px-3">
          <div className="max-w-2xl mx-auto">

            {/* 상단 툴바 */}
            <div className="flex items-center justify-between mb-3">
              <p className="text-xs text-gray-400">
                {editMode ? '멤버·카테고리·항목을 자유롭게 편집하세요' : '각자 체크하며 준비해요 ✈️'}
              </p>
              <button onClick={() => setEditMode(v => !v)}
                className={`text-xs font-bold px-3 py-1.5 rounded-lg border transition-all
                  ${editMode ? 'bg-blue-500 text-white border-blue-500' : 'bg-white text-gray-500 border-gray-200 hover:border-blue-300'}`}>
                {editMode ? '✅ 완료' : '✏️ 편집'}
              </button>
            </div>

            {/* ── 멤버 관리 (편집 모드) ── */}
            {editMode && (
              <div className="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden mb-4">
                <div className="px-3 py-2 bg-gray-50 border-b border-gray-100 flex items-center justify-between">
                  <span className="font-bold text-gray-700 text-sm">👥 여행 멤버</span>
                  <span className="text-xs text-gray-400">{people.length}명</span>
                </div>
                <div className="p-3 space-y-2">
                  {people.map((p, i) => (
                    <div key={p.id} className="flex items-center gap-2">
                      <div className="w-3 h-3 rounded-full shrink-0" style={{ background: p.hex }} />
                      <span className="text-base shrink-0">{p.emoji}</span>
                      <input value={p.key} onChange={e => renamePerson(i, e.target.value)}
                        className="flex-1 text-sm border border-gray-200 rounded-lg px-2.5 py-1.5 focus:outline-none focus:ring-2 focus:ring-blue-300 min-w-0"
                        placeholder="이름" />
                      {people.length > 1 && (
                        <button onClick={() => { if (confirm(`'${p.key}'을(를) 삭제할까요?`)) delPerson(i); }}
                          className="shrink-0 text-xs text-red-300 hover:text-red-500 hover:bg-red-50 px-2 py-1 rounded transition-all">
                          ✕
                        </button>
                      )}
                    </div>
                  ))}
                  <button onClick={addPerson}
                    className="w-full text-xs text-blue-400 hover:text-blue-600 py-1.5 border border-dashed border-blue-200 rounded-lg hover:border-blue-400 transition-all">
                    + 멤버 추가
                  </button>
                </div>
              </div>
            )}

            {/* 진행률 (일반 모드) */}
            {!editMode && (
              <div className={`grid ${gridCls} gap-2 mb-4`}>
                {people.map(p => {
                  const done = Object.values(ck[p.id] || {}).filter(Boolean).length;
                  const pct  = total > 0 ? Math.round((done / total) * 100) : 0;
                  return (
                    <div key={p.id} className="bg-white rounded-xl border border-gray-100 shadow-sm p-3">
                      <div className="flex items-center justify-between mb-1.5">
                        <span className="font-extrabold text-gray-700 text-sm truncate">{p.emoji} {p.key}</span>
                        <span className="font-extrabold text-sm shrink-0 ml-1" style={{ color: p.hex }}>{pct}%</span>
                      </div>
                      <div className="w-full bg-gray-100 rounded-full h-2 overflow-hidden">
                        <div className={`bg-gradient-to-r ${p.grad} h-2 rounded-full transition-all duration-500`}
                          style={{ width: `${pct}%` }} />
                      </div>
                      <div className="text-xs text-gray-400 mt-1">{done}/{total} 완료</div>
                      {done === total && total > 0 && (
                        <div className="text-xs font-bold mt-1 animate-bounce" style={{ color: p.hex }}>🎉 준비 완료!</div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}

            {/* 카테고리 목록 */}
            {clData.map(c => (
              <div key={c.id} className="mb-3">
                {editMode ? (
                  <div className="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
                    <div className="flex items-center justify-between px-3 py-2 bg-gray-50 border-b border-gray-100">
                      <span className="font-bold text-gray-700 text-sm">{c.cat}</span>
                      <button onClick={() => { if (confirm(`'${c.cat}' 카테고리를 삭제할까요?`)) delCat(c.id); }}
                        className="text-xs text-red-400 hover:text-red-600 font-bold px-2 py-0.5 rounded hover:bg-red-50 transition-all">
                        🗑️ 삭제
                      </button>
                    </div>
                    <div className="p-2 space-y-1">
                      {c.items.map((item, i) => (
                        <div key={i} className="flex items-center gap-2">
                          <span className="flex-1 text-sm text-gray-700 py-0.5">{item}</span>
                          <button onClick={() => delItem(c.id, i)}
                            className="shrink-0 w-5 h-5 flex items-center justify-center text-red-300 hover:text-red-500 hover:bg-red-50 rounded transition-all text-xs">✕</button>
                        </div>
                      ))}
                      {c.items.length === 0 && <p className="text-xs text-gray-300 text-center py-1">항목 없음</p>}
                      {addingTo === c.id ? (
                        <div className="flex gap-1.5 mt-1.5">
                          <input autoFocus value={newItemText} onChange={e => setNewItemText(e.target.value)}
                            onKeyDown={e => { if (e.key==='Enter') addItem(c.id); if (e.key==='Escape') { setAddingTo(null); setNewItemText(''); } }}
                            placeholder="항목 입력 후 Enter"
                            className="flex-1 text-sm border border-gray-200 rounded-lg px-2.5 py-1.5 focus:outline-none focus:ring-2 focus:ring-blue-300" />
                          <button onClick={() => addItem(c.id)} className="text-xs font-bold bg-blue-500 text-white px-2.5 py-1.5 rounded-lg">추가</button>
                          <button onClick={() => { setAddingTo(null); setNewItemText(''); }} className="text-xs text-gray-400 px-1.5">✕</button>
                        </div>
                      ) : (
                        <button onClick={() => { setAddingTo(c.id); setNewItemText(''); }}
                          className="w-full text-xs text-blue-400 hover:text-blue-600 py-1.5 border border-dashed border-blue-200 rounded-lg hover:border-blue-400 transition-all mt-1">
                          + 항목 추가
                        </button>
                      )}
                    </div>
                  </div>
                ) : (
                  <>
                    <h3 className="font-bold text-gray-600 text-xs mb-1.5 px-1">{c.cat}</h3>
                    <div className={`grid ${gridCls} gap-2`}>
                      {people.map(p => (
                        <div key={p.id} className="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
                          <div className={`bg-gradient-to-r ${p.grad} text-white text-xs font-extrabold px-2 py-1.5 text-center truncate`}>
                            {p.emoji} {p.key}
                          </div>
                          <div className="p-2 space-y-1.5">
                            {c.items.map((item, i) => {
                              const k  = `${c.id}-${i}`;
                              const on = !!(ck[p.id] || {})[k];
                              return (
                                <label key={i} className="flex items-start gap-1.5 cursor-pointer group">
                                  <button onClick={() => toggle(p.id, k)}
                                    className={`w-4 h-4 rounded border-2 flex items-center justify-center shrink-0 mt-0.5 transition-all
                                      ${on ? p.active : `border-gray-300 ${p.hover}`}`}>
                                    {on && <span className="text-white font-extrabold" style={{fontSize:'9px'}}>✓</span>}
                                  </button>
                                  <span className={`text-xs leading-snug transition-all ${on ? 'text-gray-300 line-through' : 'text-gray-600'}`}>
                                    {item}
                                  </span>
                                </label>
                              );
                            })}
                            {c.items.length === 0 && <p className="text-xs text-gray-300 text-center py-1">항목 없음</p>}
                          </div>
                        </div>
                      ))}
                    </div>
                  </>
                )}
              </div>
            ))}

            {/* 카테고리 추가 (편집 모드) */}
            {editMode && (
              <div className="bg-white rounded-xl border border-gray-100 shadow-sm p-3 mb-3">
                <p className="text-xs font-bold text-gray-500 mb-2">➕ 새 카테고리 추가</p>
                <div className="flex gap-2">
                  <input value={newCatName} onChange={e => setNewCatName(e.target.value)}
                    onKeyDown={e => { if (e.key==='Enter') addCat(); }}
                    placeholder="이름 입력 (이모티콘 자동 추가)"
                    className="flex-1 text-sm border border-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-300" />
                  <button onClick={addCat} className="text-xs font-bold bg-blue-500 text-white px-3 py-2 rounded-lg whitespace-nowrap">추가</button>
                </div>
                {newCatName.trim() && (
                  <p className="text-xs text-gray-400 mt-1.5">
                    미리보기: <span className="font-bold text-gray-700">{autoEmoji(newCatName)} {newCatName}</span>
                  </p>
                )}
              </div>
            )}

            {/* 초기화 (편집 모드) */}
            {editMode && (
              <button onClick={() => {
                if (confirm('준비물 목록과 멤버를 모두 초기화할까요?')) {
                  localStorage.removeItem(CL_KEY);
                  localStorage.removeItem(PEOPLE_KEY);
                  setClData(CHECKLIST);
                  setPeople(PEOPLE_INITIAL);
                  setCk({ p1:{}, p2:{} });
                }
              }}
                className="w-full py-2.5 rounded-xl text-sm font-bold text-red-400 hover:text-red-600 hover:bg-red-50 border border-red-100 transition-all">
                🔄 초기 상태로 되돌리기
              </button>
            )}

          </div>
        </div>
      );
    }

    /* ─────────────── 메인 앱 ─────────────── */

    const TABS = [
      { id:'home',      icon:'🏠', label:'홈' },
      { id:'d0',        icon:'✈️', label:'Day1' },
      { id:'d1',        icon:'🌃', label:'Day2' },
      { id:'d2',        icon:'🌸', label:'Day3' },
      { id:'d3',        icon:'🏠', label:'Day4' },
      { id:'checklist', icon:'✅', label:'준비물' },
      { id:'edit',      icon:'✏️', label:'편집' },
    ];

    function App() {
      const [tab, setTab] = useState('home');
      const [travelData, setTravelData] = useState(null); // null = 로딩 중
      const [checklist, setChecklist]   = useState(null);
      const [loading, setLoading]       = useState(true);

      // D1에서 초기 데이터 로드
      useEffect(() => {
        Promise.all([
          fetch('/api/places').then(r => r.json()),
          fetch('/api/checklist').then(r => r.json()),
        ]).then(([places, cl]) => {
          // places = [[...day0], [...day1], ...]  API 반환 그대로
          const merged = DAY_CFG.map((cfg, i) => ({ ...cfg, places: places[i] || [] }));
          setTravelData(merged);
          setChecklist(cl);
          setLoading(false);
        }).catch(() => {
          // API 실패 시 하드코딩 폴백
          setTravelData(TRAVEL_INITIAL);
          setChecklist(null);
          setLoading(false);
        });
      }, []);

      const handleSavePlace = async (dayIdx, updated) => {
        await fetch(`/api/places/${updated.id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ...updated, pos: updated.pos }),
        });
        setTravelData(prev => prev.map((day, di) =>
          di !== dayIdx ? day : { ...day, places: day.places.map(p => p.id === updated.id ? updated : p) }
        ));
      };

      const handleDeletePlace = async (dayIdx, id) => {
        await fetch(`/api/places/${id}`, { method: 'DELETE' });
        setTravelData(prev => prev.map((day, di) =>
          di !== dayIdx ? day : { ...day, places: day.places.filter(p => p.id !== id) }
        ));
      };

      const handleAddPlace = async (dayIdx, newPlace) => {
        const res = await fetch('/api/places', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ...newPlace, day_idx: dayIdx }),
        });
        const { id } = await res.json();
        setTravelData(prev => prev.map((day, di) =>
          di !== dayIdx ? day : { ...day, places: [...day.places, { ...newPlace, id }] }
        ));
      };

      const handleReset = async () => {
        const res = await fetch('/api/places').then(r => r.json());
        const merged = DAY_CFG.map((cfg, i) => ({ ...cfg, places: res[i] || [] }));
        setTravelData(merged);
      };

      if (loading) return (
        <div className="min-h-screen flex items-center justify-center bg-slate-50">
          <div className="text-center">
            <div className="text-4xl mb-3">🌸</div>
            <div className="text-gray-500 font-medium text-sm">일정을 불러오는 중...</div>
          </div>
        </div>
      );

      return (
        <div className="min-h-screen bg-slate-50">
          <header className="bg-gradient-to-r from-rose-500 via-pink-500 to-orange-400 text-white shadow-xl sticky top-0 z-50">
            <div className="max-w-3xl mx-auto px-4 pt-safe">
              <div className="flex items-center gap-3 py-3 border-b border-white/20">
                <span className="text-2xl">🌸</span>
                <div className="flex-1 min-w-0">
                  <h1 className="font-extrabold text-base sm:text-lg leading-tight truncate">{TRIP.title}</h1>
                  <p className="text-pink-100 text-xs">{TRIP.dates} · {TRIP.nights}</p>
                </div>
                <div className="text-right shrink-0">
                  <div className="text-xs bg-white/20 rounded-full px-2.5 py-1 font-bold">🏨 아카사카</div>
                </div>
              </div>
              <div className="flex gap-0.5 py-2 overflow-x-auto scrollbar-hide">
                {TABS.map(t => (
                  <button key={t.id} onClick={() => setTab(t.id)}
                    className={`tab-btn flex-1 min-w-[44px] flex flex-col items-center py-1.5 px-1 rounded-lg text-xs font-bold
                      ${tab === t.id ? 'bg-white/30 text-white shadow-sm scale-105' : 'text-white/60 hover:bg-white/15 hover:text-white'}`}>
                    <span className="text-sm">{t.icon}</span>
                    <span className="mt-0.5 text-xs">{t.label}</span>
                  </button>
                ))}
              </div>
            </div>
          </header>

          <main className="max-w-3xl mx-auto">
            <HomeView onDay={setTab} show={tab === 'home'} travelData={travelData} />
            {tab === 'd0' && <DayView idx={0} travelData={travelData} onSavePlace={handleSavePlace} />}
            {tab === 'd1' && <DayView idx={1} travelData={travelData} onSavePlace={handleSavePlace} />}
            {tab === 'd2' && <DayView idx={2} travelData={travelData} onSavePlace={handleSavePlace} />}
            {tab === 'd3' && <DayView idx={3} travelData={travelData} onSavePlace={handleSavePlace} />}
            {tab === 'checklist' && <ChecklistView dbData={checklist} />}
            {tab === 'edit' && (
              <EditView
                travelData={travelData}
                onSavePlace={handleSavePlace}
                onDeletePlace={handleDeletePlace}
                onAddPlace={handleAddPlace}
                onReset={handleReset}
              />
            )}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
